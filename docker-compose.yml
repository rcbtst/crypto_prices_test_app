services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - .:/app:cached
      - /app/__pycache__
      - venv:/app/.venv
    command: ./start.sh

  celery:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - .:/app:cached
      - /app/__pycache__
      - venv:/app/.venv
    command: celery -A src.interfaces.workers.ticker_worker.app worker -B -l INFO -c 1

  postgres:
    hostname: postgres
    image: postgres:18.1
    environment:
      - POSTGRES_DB=tickers_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d tickers_db" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    hostname: redis
    image: redis:8.6.1
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  venv:
